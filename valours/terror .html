<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* VARIÁVEIS DO TEMA */
    :root { 
      --bg-deep: #0A0A14; 
      --accent: #8B0000; /* Vermelho Terror */
      --purple: #7F77DD; /* Roxo Valours */
      --text: #E8E8F0; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      background-color: var(--bg-deep); 
      color: var(--text); 
      font-family: 'Sora', sans-serif; 
      overflow-x: hidden; 
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    
    /* HEADER & NAV */
    header { width: 100%; padding: 20px 0; position: absolute; z-index: 10; }
    .header-content { display: flex; justify-content: space-between; align-items: center; }
    .header-icons a i { color: var(--purple); margin-right: 15px; transition: 0.3s; }
    .header-icons a:hover i { color: var(--accent); transform: scale(1.2); }

    /* HERO */
    .bg-home { 
      min-height: 90vh; 
      background: linear-gradient(rgba(10,10,20,0.85), var(--bg-deep)), url('assets/terror-bg.jpg') center/cover; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      text-align: center; 
    }
    
    .hero h1 { 
      font-size: clamp(32px, 5vw, 60px); 
      color: var(--accent); 
      text-shadow: 0 0 15px rgba(139, 0, 0, 0.6); 
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* GRID DE JOGOS - IMAGEM TOTAL */
    .haircuts-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      gap: 30px; 
      padding: 80px 0; 
    }

    .haircut-card { 
      background: #151525; 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid rgba(127, 119, 221, 0.1); 
      transition: 0.4s ease; 
    }

    .haircut-card:hover { 
      border-color: var(--accent); 
      transform: translateY(-10px);
      box-shadow: 0 0 25px rgba(139, 0, 0, 0.3); 
    }

    .card-image { width: 100%; height: 420px; overflow: hidden; }

    /* ESTE É O AJUSTE PARA PEGAR A IMAGEM TODA */
    .card-image img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; /* Preenche o card sem distorcer e sem bordas pretas */
      filter: grayscale(40%) contrast(1.1); 
      transition: 0.6s ease; 
    }

    .haircut-card:hover img { filter: grayscale(0%); transform: scale(1.1); }

    .card-info { 
      padding: 25px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: #151525;
    }

    .card-info strong { font-size: 18px; letter-spacing: 0.5px; }

    .card-info button { 
      background: var(--accent); 
      color: white; 
      border: none; 
      padding: 10px 20px; 
      cursor: pointer; 
      font-weight: 700; 
      border-radius: 4px;
      transition: 0.3s;
    }

    .card-info button:hover { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
    
    /* MAPA MODO DARK */
    iframe { 
      width: 100%; 
      height: 450px; 
      border: 0; 
      filter: invert(90%) hue-rotate(180deg) brightness(0.9); 
    }
    
    /* FOOTER */
    .footer { 
      padding: 60px 0; 
      text-align: center; 
      border-top: 1px solid #1a1a2e; 
      background: #05050A; 
    }

    .footer-icons { margin-bottom: 20px; }
    .footer-icons a i { color: var(--purple); margin: 0 15px; transition: 0.3s; }
    .footer-icons a:hover i { color: var(--accent); }

    /* WHATSAPP */
    .btn-whatsapp { position: fixed; bottom: 30px; right: 30px; z-index: 99; transition: 0.3s; }
    .btn-whatsapp img { width: 65px; filter: drop-shadow(0 0 10px var(--accent)); }
    .btn-whatsapp:hover { transform: scale(1.1); }

    @media (max-width: 768px) {
      .hero h1 { font-size: 35px; }
      .header-content { flex-direction: column; gap: 20px; }
    }
  </style>
  <title>Valours | Terror</title>
</head>
<body>

  <header class="container">
    <nav class="header-content">
      <div class="header-icons" data-aos="fade-down">
        <a href="#"><i class="fa-brands fa-instagram fa-2x"></i></a>
        <a href="#"><i class="fa-brands fa-discord fa-2x"></i></a>
        <a href="#"><i class="fa-brands fa-twitch fa-2x"></i></a>
      </div>
      <div class="header-logo" data-aos="zoom-in">
        <img src="assets/logo-nova.png" alt="Logo Valours" style="width: 150px;">
      </div>
      <div data-aos="fade-down">
        <a href="#" style="text-decoration: none; color: var(--purple); font-weight: bold; border: 1px solid var(--purple); padding: 8px 15px; border-radius: 4px;">ÁREA DE ELITE</a>
      </div>
    </nav>
  </header>

  <div class="bg-home">
    <div class="hero" data-aos="zoom-in">
      <h1>ENCARE SEUS MEDOS.</h1>
      <p>A elite do Survival Horror e mistério para quem não teme o escuro.</p>
    </div>
  </div>

  <section class="container">
    <div class="haircuts-grid">
      <div class="haircut-card" data-aos="fade-up">
        <div class="card-image"><img src="assets/outlest.jpg" alt="Resident Evil 4"></div>
        <div class="card-info">
          <strong>Resident Evil 4</strong>
          <button>R$ 199</button>
        </div>
      </div>

      <div class="haircut-card" data-aos="fade-up" data-aos-delay="200">
        <div class="card-image"><img src="assets/untildown.jpg" alt="Silent Hill 2"></div>
        <div class="card-info">
          <strong>Silent Hill 2</strong>
          <button>R$ 249</button>
        </div>
      </div>

      <div class="haircut-card" data-aos="fade-up" data-aos-delay="400">
        <div class="card-image"><img src="assets/terror.jpg" alt="Alan Wake 2"></div>
        <div class="card-info">
          <strong>Alan Wake 2</strong>
          <button>R$ 279</button>
        </div>
      </div>
      <div class="haircut-card" data-aos="fade-up" data-aos-delay="400">
        <div class="card-image"><img src="assets/freddy.jpg" alt="Alan Wake 2"></div>
        <div class="card-info">
          <strong>Alan Wake 2</strong>
          <button>R$ 279</button>
        </div>
      </div>
    </div>
  </section>

  <div style="text-align: center; padding: 40px 0;">
    <h2 style="color: var(--purple); text-transform: uppercase;">Localização das Trevas</h2>
  </div>
  <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15000!2d-47!3d-15!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v123456789" loading="lazy"></iframe>
  
  <footer class="footer">
    <div class="footer-icons">
      <a href="#"><i class="fa-brands fa-instagram fa-2x"></i></a>
      <a href="#"><i class="fa-brands fa-facebook fa-2x"></i></a>
      <a href="#"><i class="fa-brands fa-tiktok fa-2x"></i></a>
    </div>
    <p>Copyright 2026 | Valours Gamers - Terror Division</p>
  </footer>

  <a href="#" class="btn-whatsapp">
    <img src="assets/whatssapp.svg" alt="Whatsapp">
  </a>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
